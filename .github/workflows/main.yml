name: Java Integrity Check

on:
  push

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # or 'gradle'

      - name: Compile and Test
        # This command will exit with an error code if the code doesn't compile
        run: mvn clean verify # Use './gradlew build' if using Gradle
